server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: location-service
          uri: http://${LOCATION_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/v1/locations/**
          filters:
            - AddRequestHeader=X-Gateway-Source, api-gateway

        - id: store-service
          uri: http://${STORE_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/api/v1/stores/**
          filters:
            - AddRequestHeader=X-Gateway-Source, api-gateway

        - id: distance-service
          uri: http://${DISTANCE_SERVICE_HOST:localhost}:8085
          predicates:
            - Path=/api/v1/distances/**
          filters:
            - AddRequestHeader=X-Gateway-Source, api-gateway

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
            allowedHeaders: "*"

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.couriertracking: DEBUG
